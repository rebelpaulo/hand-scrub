<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pinch Draw — pintura de luz por gestos</title>
<style>
  :root {
    --panel: #0f1219cc;
    --line: #2a3245;
    --text: #eef2f8;
    --muted: #98a2b6;
    --hot: #fb7185;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #07080d; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif; color: var(--text); }

  canvas#stage { position: fixed; inset: 0; display: block; }

  /* ---------- hint pill ---------- */
  #hint {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: var(--panel); backdrop-filter: blur(10px);
    border: 1px solid var(--line); border-radius: 99px;
    padding: 9px 18px; font-size: 13px; color: var(--text);
    z-index: 50; white-space: nowrap; pointer-events: none;
  }

  /* ---------- camera-fail notice ---------- */
  #notice {
    position: fixed; left: 50%; top: 18px; transform: translateX(-50%);
    background: var(--panel); backdrop-filter: blur(10px);
    border: 1px solid var(--line); border-radius: 99px;
    padding: 9px 18px; font-size: 13px; color: var(--hot);
    z-index: 60; white-space: nowrap;
  }
  #notice[hidden] { display: none; }

  /* ---------- tiny camera PiP ---------- */
  #pipWrap {
    position: fixed; right: 16px; bottom: 16px; width: 160px; aspect-ratio: 4/3;
    z-index: 50; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--line); background: #05070a;
    box-shadow: 0 12px 30px -14px #000;
  }
  canvas#pipCanvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); }
  video#pipVideo { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <a href="index.html" style="position:fixed;top:16px;left:16px;z-index:95;text-decoration:none;color:#eef2f8;background:#0f1219cc;border:1px solid #2a3245;border-radius:11px;padding:8px 14px;font-size:13px;font-weight:600">← voltar</a>
  <canvas id="stage"></canvas>

  <div id="hint">🤏 aperta o polegar e o indicador para escrever no ar</div>
  <div id="notice" hidden></div>

  <div id="pipWrap">
    <video id="pipVideo" playsinline muted></video>
    <canvas id="pipCanvas"></canvas>
  </div>

<script type="module">
const $ = id => document.getElementById(id);
const stage = $("stage"), sctx = stage.getContext("2d");
const pipVideo = $("pipVideo"), pipCanvas = $("pipCanvas"), pctx = pipCanvas.getContext("2d");
const notice = $("notice");

/* ================= tunables ================= */
const PINCH_ENTER = 0.35, PINCH_EXIT = 0.5; // histerese: entra apertado, sai largo — sem traços picotados no limiar
const EMA_ALPHA = 0.4;         // point smoothing
const MIN_POINT_DIST = 3;      // px, minimum spacing between stored points
const FADE_START = 3000;       // ms, full brightness until here
const FADE_END = 5000;         // ms, fully faded (and pruned) by here
const COLOR_A = [0x4d, 0xa6, 0xff]; // #4da6ff electric blue
const COLOR_B = [0xff, 0x4d, 0xd2]; // #ff4dd2 magenta

function dist(a, b) { const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0); return Math.hypot(dx, dy, dz); }
function lerpColor(t) {
  const r = COLOR_A[0] + (COLOR_B[0] - COLOR_A[0]) * t;
  const g = COLOR_A[1] + (COLOR_B[1] - COLOR_A[1]) * t;
  const b = COLOR_A[2] + (COLOR_B[2] - COLOR_A[2]) * t;
  return `rgb(${r | 0}, ${g | 0}, ${b | 0})`;
}
function fadeAlpha(age) {
  if (age <= FADE_START) return 1;
  if (age >= FADE_END) return 0;
  return 1 - (age - FADE_START) / (FADE_END - FADE_START);
}
const ALPHA_STEP = 0.15;
function quantizeAlpha(a) {
  // clamp: 1.0 isn't a multiple of 0.15, so the nearest step (1.05) would
  // overshoot — an out-of-range globalAlpha is silently ignored by canvas,
  // leaving a stale value from the previous draw call.
  return Math.min(1, Math.max(0, Math.round(a / ALPHA_STEP) * ALPHA_STEP));
}

// Splits a stroke's points into consecutive runs sharing the same quantized
// fade alpha, so each run can be stroked as ONE smooth path (no per-segment
// joints). Each run (after the first) starts at the previous run's last
// point so sub-paths connect with no visual seam. Returns [] if fewer than
// 2 points are still visible (alpha > 0).
function computeRuns(pts, now) {
  const n = pts.length;
  const runs = [];
  let i = 0;
  while (i < n && fadeAlpha(now - pts[i].t) <= 0) i++; // skip fully-faded head
  while (i < n) {
    const q = quantizeAlpha(fadeAlpha(now - pts[i].t));
    let j = i;
    while (j + 1 < n && quantizeAlpha(fadeAlpha(now - pts[j + 1].t)) === q) j++;
    const start = runs.length ? i - 1 : i; // anchor to previous run's last point
    runs.push({ start, end: j, alpha: q });
    i = j + 1;
  }
  return runs;
}

// Traces one smooth quadratic path over pts[start..end] into ctx's current
// path (moveTo the first point, then a quad curve through each midpoint,
// finishing with a lineTo the exact last point).
function tracePath(ctx, pts, start, end) {
  ctx.beginPath();
  ctx.moveTo(pts[start].x, pts[start].y);
  for (let i = start + 1; i < end; i++) {
    const mx = (pts[i].x + pts[i + 1].x) / 2, my = (pts[i].y + pts[i + 1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  ctx.lineTo(pts[end].x, pts[end].y);
}

/* ================= canvas sizing (DPR-aware) ================= */
let W = 0, H = 0;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  stage.width = W * dpr; stage.height = H * dpr;
  stage.style.width = W + "px"; stage.style.height = H + "px";
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

/* ================= stroke state ================= */
// ponytail: strokes tracked by per-frame detection index (0/1), not by a
// stable hand id — if two hands cross/swap detection order mid-air the
// active stroke ownership can jump. Fine for a single-purpose install piece;
// upgrade to IoU/position-based hand tracking if that glitch shows up live.
let strokes = []; // { points: [{x,y,t}], active }
const handState = [
  { visible: false, pinching: false, stroke: null, sx: 0, sy: 0, x: 0, y: 0, lm4: null, lm8: null },
  { visible: false, pinching: false, stroke: null, sx: 0, sy: 0, x: 0, y: 0, lm4: null, lm8: null },
];

/* ================= render loop (always running) ================= */
function drawBackground() {
  sctx.clearRect(0, 0, W, H);
  sctx.fillStyle = "#07080d";
  sctx.fillRect(0, 0, W, H);
  const g = sctx.createRadialGradient(W / 2, H * 0.42, 0, W / 2, H * 0.42, Math.max(W, H) * 0.7);
  g.addColorStop(0, "rgba(70,55,150,0.28)");
  g.addColorStop(0.5, "rgba(40,32,95,0.12)");
  g.addColorStop(1, "rgba(7,8,13,0)");
  sctx.fillStyle = g;
  sctx.fillRect(0, 0, W, H);
}

function drawStrokes(now) {
  // prune points older than FADE_END, drop emptied+finished strokes
  for (const s of strokes) {
    while (s.points.length && now - s.points[0].t > FADE_END) s.points.shift();
  }
  strokes = strokes.filter(s => s.points.length > 0 || s.active);

  sctx.lineCap = "round"; sctx.lineJoin = "round";
  for (const s of strokes) {
    const pts = s.points;
    if (pts.length < 2) continue;
    const n = pts.length - 1;
    const runs = computeRuns(pts, now);

    // pass 1: thick glow, hue interpolated blue -> magenta along the stroke
    sctx.globalCompositeOperation = "lighter";
    sctx.lineWidth = 14; sctx.shadowBlur = 24;
    for (const r of runs) {
      if (r.end - r.start < 1 || r.alpha <= 0) continue;
      const color = lerpColor(((r.start + r.end) / 2) / (n || 1));
      sctx.globalAlpha = r.alpha;
      sctx.strokeStyle = color; sctx.shadowColor = color;
      tracePath(sctx, pts, r.start, r.end);
      sctx.stroke();
    }

    // pass 2: thin hot white core
    sctx.globalCompositeOperation = "source-over";
    sctx.lineWidth = 4; sctx.shadowBlur = 8; sctx.shadowColor = "#ffffff"; sctx.strokeStyle = "#ffffff";
    for (const r of runs) {
      if (r.end - r.start < 1 || r.alpha <= 0) continue;
      sctx.globalAlpha = r.alpha;
      tracePath(sctx, pts, r.start, r.end);
      sctx.stroke();
    }
  }
  sctx.globalAlpha = 1; sctx.globalCompositeOperation = "source-over"; sctx.shadowBlur = 0;
}

function drawCursors() {
  const colors = ["#4da6ff", "#ff4dd2"];
  for (let i = 0; i < 2; i++) {
    const st = handState[i];
    if (!st.visible || st.pinching) continue;
    sctx.beginPath();
    sctx.arc(st.x, st.y, 9, 0, Math.PI * 2);
    sctx.fillStyle = colors[i];
    sctx.shadowColor = colors[i]; sctx.shadowBlur = 16;
    sctx.globalAlpha = 0.85;
    sctx.fill();
  }
  sctx.globalAlpha = 1; sctx.shadowBlur = 0;
}

function renderLoop() {
  const now = performance.now();
  drawBackground();
  drawStrokes(now);
  drawCursors();
  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

/* ================= hand tracking ================= */
function processHands(res, now) {
  const hands = res.landmarks || [];
  for (let i = 0; i < 2; i++) {
    const st = handState[i];
    const lm = hands[i];
    if (!lm) {
      st.visible = false;
      if (st.stroke) { st.stroke.active = false; st.stroke = null; }
      st.pinching = false; st.lm4 = null; st.lm8 = null;
      continue;
    }
    st.visible = true;
    st.lm4 = lm[4]; st.lm8 = lm[8];

    const handSize = dist(lm[0], lm[9]) || 0.0001;
    const ratio = dist(lm[4], lm[8]) / handSize;
    const isPinch = st.pinching ? ratio < PINCH_EXIT : ratio < PINCH_ENTER;
    const midXn = (lm[4].x + lm[8].x) / 2, midYn = (lm[4].y + lm[8].y) / 2;
    const rawX = (1 - midXn) * W, rawY = midYn * H; // mirrored to match selfie view

    if (isPinch) {
      if (!st.pinching) {
        // new pinch = new stroke; seed smoothing with the raw point (no lag-in)
        st.sx = rawX; st.sy = rawY;
        st.stroke = { points: [], active: true };
        strokes.push(st.stroke);
      } else {
        st.sx += (rawX - st.sx) * EMA_ALPHA;
        st.sy += (rawY - st.sy) * EMA_ALPHA;
      }
      const pts = st.stroke.points;
      const last = pts[pts.length - 1];
      if (!last || Math.hypot(st.sx - last.x, st.sy - last.y) >= MIN_POINT_DIST) {
        pts.push({ x: st.sx, y: st.sy, t: now });
      }
      st.x = st.sx; st.y = st.sy;
    } else {
      if (st.pinching && st.stroke) { st.stroke.active = false; st.stroke = null; }
      st.x = rawX; st.y = rawY;
    }
    st.pinching = isPinch;
  }
}

function drawPip() {
  pctx.clearRect(0, 0, pipCanvas.width, pipCanvas.height);
  if (pipVideo.readyState >= 2) pctx.drawImage(pipVideo, 0, 0, pipCanvas.width, pipCanvas.height);
  const colors = ["#4da6ff", "#ff4dd2"];
  for (let i = 0; i < 2; i++) {
    const st = handState[i];
    if (!st.visible || !st.lm4 || !st.lm8) continue;
    pctx.fillStyle = colors[i];
    for (const p of [st.lm4, st.lm8]) {
      pctx.beginPath();
      pctx.arc(p.x * pipCanvas.width, p.y * pipCanvas.height, 4, 0, Math.PI * 2);
      pctx.fill();
    }
  }
}

/* ================= mediapipe model + camera ================= */
let landmarker = null, running = false, lastVideoTime = -1;

function showNotice(msg) { notice.textContent = msg; notice.hidden = false; }

async function initModel() {
  const { FilesetResolver, HandLandmarker } =
    await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs");
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  landmarker = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO", numHands: 2
  });
}

function loop() {
  if (!running) return;
  const now = performance.now();
  if (pipVideo.currentTime !== lastVideoTime) {
    lastVideoTime = pipVideo.currentTime;
    const res = landmarker.detectForVideo(pipVideo, now);
    processHands(res, now);
  }
  drawPip();
  requestAnimationFrame(loop);
}

async function start() {
  try {
    await initModel();
  } catch (e) {
    showNotice("📷 câmara indisponível — falha ao carregar o modelo de mãos");
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 960, height: 720, facingMode: "user" } });
    pipVideo.srcObject = stream; await pipVideo.play();
    pipCanvas.width = 160; pipCanvas.height = Math.round(160 * (pipVideo.videoHeight / pipVideo.videoWidth || 0.75));
    running = true;
    stream.getVideoTracks()[0]?.addEventListener("ended", () => {
      running = false;
      handState.forEach(st => { st.visible = false; st.pinching = false; if (st.stroke) st.stroke.active = false; st.stroke = null; });
      showNotice("📷 câmara indisponível — câmara desligada");
    });
    loop();
  } catch (e) {
    showNotice("📷 câmara indisponível — verifica as permissões");
  }
}
start();
</script>
</body>
</html>
