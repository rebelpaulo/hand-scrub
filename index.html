<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✋ hand-scrub — escolhe a experiência</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;900&family=Archivo:wght@500;600;700&display=swap');

  :root {
    --panel: #0f1219cc;
    --line: #2a3245;
    --text: #eef2f8;
    --muted: #98a2b6;
    --accent: #5eead4;   /* teal — Butterfly Effect */
    --accent-2: #818cf8;
    --hot: #fb7185;
    --amber: #f59e0b;    /* Sala de Sombras */
    --magenta: #ff4dd2;  /* Pinch Draw */
    --bg-0: #000;
    --bg-1: #05070a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; width: 100%; background: var(--bg-0);
    overflow: hidden; color: var(--text);
    font-family: Archivo, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .display {
    font-family: "Big Shoulders Display", Archivo, sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  button { font-family: inherit; }
  a { color: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* ============================================================ stage */
  .stage {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    overflow: hidden; background: var(--bg-0);
  }
  .view {
    position: absolute; inset: 0; width: 100%; height: 100%;
    transition: opacity .35s ease-out;
  }
  .view[hidden] { display: none; }

  /* ============================================================ ATTRACT */
  #bgArt {
    position: absolute; inset: 0; z-index: 0;
    background-image: url('media/home-bg.jpg');
    background-size: cover; background-position: center;
    opacity: .32;
  }
  #bgArt::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, #000000b0, #000000e6);
  }
  .view-attract .bg {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(1200px 800px at 18% 22%, #10241fcc, transparent 60%),
      radial-gradient(1000px 700px at 82% 78%, #0c1a2fcc, transparent 60%),
      linear-gradient(160deg, #04070a 0%, #060a10 45%, #030405 100%);
    background-size: 180% 180%, 180% 180%, 100% 100%;
    animation: bgDrift 22s ease-in-out infinite alternate;
  }
  .view-attract .bg::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 50% 50%, transparent 55%, #000000b0 100%);
    pointer-events: none;
  }
  @keyframes bgDrift {
    0%   { background-position: 0% 20%, 100% 80%, 0 0; }
    100% { background-position: 30% 45%, 70% 55%, 0 0; }
  }

  .scene-tag {
    position: absolute; left: clamp(24px, 4vw, 64px); bottom: clamp(28px, 6vh, 72px);
    z-index: 3; transition: opacity .3s ease-out;
  }
  .scene-tag .eyebrow {
    display: flex; align-items: center; gap: 8px;
    font-size: clamp(11px, 1vw, 14px); font-weight: 700; letter-spacing: .22em;
    color: var(--exp-accent, var(--accent)); text-transform: uppercase; margin: 0 0 6px 2px;
  }
  .scene-tag .eyebrow .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--exp-accent, var(--accent));
    box-shadow: 0 0 12px var(--exp-accent, var(--accent)); animation: pulseDot 1.8s ease-in-out infinite;
  }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .scene-tag h1 {
    margin: 0; font-size: clamp(40px, 8.5vw, 128px); line-height: .88;
    color: var(--text); text-shadow: 0 8px 40px #000c;
    transition: opacity .3s ease-out;
  }
  .scene-tag .hint-line {
    margin: 12px 0 0 3px; font-size: clamp(13px, 1.1vw, 17px); color: var(--muted);
    font-weight: 600; letter-spacing: .02em;
  }

  /* ghost hand — SVG silhouette cycling open -> closed */
  .ghost-hand-wrap {
    position: absolute; right: clamp(6vw, 12vw, 16vw); top: 50%;
    transform: translateY(-52%);
    width: clamp(220px, 24vw, 420px); z-index: 2;
    display: flex; align-items: center; justify-content: center;
  }
  .ghost-hand-wrap .halo {
    position: absolute; width: 62%; height: 62%; border-radius: 50%;
    background: radial-gradient(circle, var(--exp-accent, var(--accent)) 0%, transparent 70%);
    opacity: .2;
    animation: haloBreathe 3.6s ease-in-out infinite;
  }
  @keyframes haloBreathe { 0%,100% { transform: scale(.9); opacity: .12; } 50% { transform: scale(1.15); opacity: .3; } }
  .ghost-hand-wrap svg { position: relative; width: 100%; height: auto; opacity: .92; }
  .finger { transform-box: fill-box; animation: curl 3.6s cubic-bezier(.4,0,.2,1) infinite; }
  .finger.f1 { transform-origin: 50% 100%; animation-delay: 0ms; }
  .finger.f2 { transform-origin: 50% 100%; animation-delay: 60ms; }
  .finger.f3 { transform-origin: 50% 100%; animation-delay: 120ms; }
  .finger.f4 { transform-origin: 50% 100%; animation-delay: 180ms; }
  .finger.thumb { transform-origin: 100% 60%; animation: curlThumb 3.6s cubic-bezier(.4,0,.2,1) infinite; animation-delay: 30ms; }
  .finger, .palm { stroke: var(--exp-accent, var(--accent)); transition: stroke .3s ease-out; }
  @keyframes curl {
    0%, 8%   { transform: rotate(0deg); }
    42%, 58% { transform: rotate(112deg); }
    92%, 100%{ transform: rotate(0deg); }
  }
  @keyframes curlThumb {
    0%, 8%   { transform: rotate(0deg); }
    42%, 58% { transform: rotate(55deg); }
    92%, 100%{ transform: rotate(0deg); }
  }

  /* ============================================================ SELECTOR */
  .view-selector {
    background: radial-gradient(1400px 900px at 50% 0%, #0b0f18, #020304 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: clamp(20px, 4vh, 48px); padding: 4vw;
  }
  .selector-head { text-align: center; }
  .selector-head .eyebrow {
    font-size: clamp(11px, 1vw, 14px); font-weight: 700; letter-spacing: .28em;
    color: var(--muted); text-transform: uppercase; margin: 0 0 8px;
  }
  .selector-head h2 {
    margin: 0; font-size: clamp(28px, 4vw, 54px); font-weight: 900;
    letter-spacing: -0.01em; color: var(--text);
  }
  .cards {
    display: flex; gap: clamp(16px, 2vw, 32px); width: 100%; max-width: 1400px;
    justify-content: center; flex-wrap: wrap;
  }
  .card {
    position: relative; flex: 1 1 320px; max-width: 420px; min-width: 260px;
    border-radius: 20px; overflow: hidden; cursor: pointer;
    border: 1px solid var(--line); background: #0a0d13; text-align: left;
    padding: 0; appearance: none; color: inherit; font-family: inherit;
    transition: transform .3s ease-out, border-color .3s ease-out, box-shadow .3s ease-out;
  }
  .card:hover, .card:focus-visible, .card.hover { transform: translateY(-6px); box-shadow: 0 30px 60px -24px #000c; }
  .card[data-accent="teal"]:hover, .card[data-accent="teal"]:focus-visible, .card[data-accent="teal"].hover { border-color: var(--accent); }
  .card[data-accent="amber"]:hover, .card[data-accent="amber"]:focus-visible, .card[data-accent="amber"].hover { border-color: var(--amber); }
  .card[data-accent="magenta"]:hover, .card[data-accent="magenta"]:focus-visible, .card[data-accent="magenta"].hover { border-color: var(--magenta); }
  .card.selected { transform: translateY(-6px) scale(1.02); }
  .card[data-accent="teal"].selected    { border-color: var(--accent);  box-shadow: 0 0 0 2px #5eead455, 0 30px 70px -20px #5eead433; }
  .card[data-accent="amber"].selected   { border-color: var(--amber);   box-shadow: 0 0 0 2px #f59e0b55, 0 30px 70px -20px #f59e0b33; }
  .card[data-accent="magenta"].selected { border-color: var(--magenta); box-shadow: 0 0 0 2px #ff4dd255, 0 30px 70px -20px #ff4dd233; }

  .card .preview { position: relative; aspect-ratio: 16/10; overflow: hidden; }
  .card[data-accent="teal"] .preview {
    background: radial-gradient(120% 120% at 20% 20%, #123b34, #05100e 70%);
    animation: previewShiftTeal 9s ease-in-out infinite alternate;
  }
  .card[data-accent="amber"] .preview {
    background: radial-gradient(120% 120% at 80% 30%, #3a2a0c, #100b04 70%);
    animation: previewShiftAmber 9s ease-in-out infinite alternate;
  }
  .card[data-accent="magenta"] .preview {
    background: radial-gradient(120% 120% at 30% 80%, #3a0c34, #10041e 70%);
    animation: previewShiftMagenta 9s ease-in-out infinite alternate;
  }
  @keyframes previewShiftTeal    { from { background-position: 0% 0%; } to { background-position: 40% 60%; } }
  @keyframes previewShiftAmber   { from { background-position: 100% 0%; } to { background-position: 60% 50%; } }
  @keyframes previewShiftMagenta { from { background-position: 0% 100%; } to { background-position: 55% 30%; } }
  .card .preview .icon {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 10px 30px #0008);
    animation: iconFloat 4.5s ease-in-out infinite;
  }
  .card .preview .icon svg { width: clamp(48px, 6vw, 84px); height: clamp(48px, 6vw, 84px); }
  .card[data-accent="teal"] .preview .icon svg    { color: var(--accent); }
  .card[data-accent="amber"] .preview .icon svg   { color: var(--amber); }
  .card[data-accent="magenta"] .preview .icon svg { color: var(--magenta); }
  @keyframes iconFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  /* dwell ring — filled by real mouse :hover (CSS) or by gesture dwell (JS) */
  .dwell {
    position: absolute; top: 14px; right: 14px; width: 46px; height: 46px; z-index: 3;
  }
  .dwell svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .dwell circle.track { fill: none; stroke: #ffffff22; stroke-width: 4; }
  .dwell circle.fill {
    fill: none; stroke-width: 4; stroke-linecap: round;
    stroke-dasharray: 125.6; stroke-dashoffset: 125.6;
    transition: stroke-dashoffset .7s linear;
  }
  .card[data-accent="teal"] .dwell circle.fill    { stroke: var(--accent); }
  .card[data-accent="amber"] .dwell circle.fill   { stroke: var(--amber); }
  .card[data-accent="magenta"] .dwell circle.fill { stroke: var(--magenta); }
  .card:hover .dwell circle.fill { stroke-dashoffset: 0; }
  /* gesture-driven dwell writes stroke-dashoffset inline (JS) — no CSS transition then */
  .card.gesture-dwelling .dwell circle.fill { transition: none; }

  .card .body { padding: 18px 20px 22px; }
  .card .body .title {
    margin: 0 0 6px; font-size: clamp(20px, 1.8vw, 28px); font-weight: 800;
    color: var(--text); letter-spacing: -0.01em;
  }
  .card .body .desc {
    margin: 0; font-size: clamp(13px, 1vw, 15px); color: var(--muted); line-height: 1.5;
  }

  /* ============================================================ hand cursor */
  #cursor {
    position: fixed; top: 0; left: 0; width: 26px; height: 26px;
    border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 18px 6px #5eead4aa, 0 0 0 2px #0009;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 200; display: none;
    transition: background .15s;
  }
  #cursor.confirming { background: var(--hot); box-shadow: 0 0 18px 6px #fb718599, 0 0 0 2px #0009; }

  /* ============================================================ camera PiP */
  #camPip {
    position: fixed; right: 18px; bottom: 18px; width: 160px; z-index: 150;
    border-radius: 12px; overflow: hidden; border: 1px solid var(--line);
    background: #05070a; box-shadow: 0 16px 40px -16px #000;
  }
  #camPip .view { position: relative; aspect-ratio: 4/3; }
  #camPip video, #camPip canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transform: scaleX(-1);
  }
  #camPip[hidden] { display: none; }

  /* ============================================================ fallback notice */
  #notice {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--line); border-radius: 99px;
    padding: 8px 16px; font-size: 12.5px; color: var(--muted); z-index: 160;
    opacity: 0; transition: opacity .3s; pointer-events: none;
    backdrop-filter: blur(10px);
  }
  #notice.show { opacity: 1; }

  /* ============================================================ prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce) {
    .view-attract .bg,
    .scene-tag .eyebrow .dot,
    .ghost-hand-wrap .halo,
    .finger, .finger.thumb,
    .card .preview,
    .card .preview .icon { animation: none !important; }
  }

  /* ============================================================ narrow-screen degrade */
  @media (max-width: 720px) {
    .ghost-hand-wrap { width: 46vw; right: 6vw; top: 40%; }
    .scene-tag h1 { font-size: clamp(34px, 12vw, 60px); }
    .cards { flex-direction: column; align-items: stretch; }
    .card { max-width: 100%; }
    #camPip { width: 110px; }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">

    <!-- ================= ATTRACT ================= -->
    <section class="view view-attract" id="viewAttract">
      <div id="bgArt"></div>
      <div class="bg"></div>

      <div class="ghost-hand-wrap">
        <div class="halo"></div>
        <svg aria-hidden="true" viewBox="0 0 220 260" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect class="finger f4" x="46"  y="70"  width="20" height="92" rx="10" fill="#eef2f8" opacity=".14" stroke-width="1.4"/>
          <rect class="finger f3" x="74"  y="52"  width="22" height="112" rx="11" fill="#eef2f8" opacity=".16" stroke-width="1.4"/>
          <rect class="finger f2" x="104" y="46"  width="22" height="118" rx="11" fill="#eef2f8" opacity=".18" stroke-width="1.4"/>
          <rect class="finger f1" x="134" y="58"  width="20" height="104" rx="10" fill="#eef2f8" opacity=".16" stroke-width="1.4"/>
          <rect class="finger thumb" x="20" y="140" width="52" height="22" rx="11" fill="#eef2f8" opacity=".18" stroke-width="1.4"/>
          <rect class="palm" x="44" y="150" width="118" height="88" rx="30" fill="#eef2f8" opacity=".14" stroke-width="1.6"/>
        </svg>
      </div>

      <div class="scene-tag">
        <p class="eyebrow"><span class="dot"></span>hand-scrub</p>
        <h1 class="display" id="attractName">🦋 BUTTERFLY EFFECT</h1>
        <p class="hint-line">toca ou aproxima-te para escolher</p>
      </div>
    </section>

    <!-- ================= SELECTOR ================= -->
    <section class="view view-selector" id="viewSelector" hidden>
      <div class="selector-head">
        <p class="eyebrow">Escolhe a experiência</p>
        <h2 class="display">hand-scrub</h2>
      </div>
      <div class="cards" id="cards">

        <button class="card" type="button" data-accent="teal" data-href="scrub.html">
          <div class="preview"><span class="icon">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5c-1-3-4-3-5-1-1 2 0 4 2 5 1.5.8 2.5 2 3 4"/><path d="M12 5c1-3 4-3 5-1 1 2 0 4-2 5-1.5.8-2.5 2-3 4"/><path d="M12 9c-2 1-4 3-4 6 0 2 1 4 4 4"/><path d="M12 9c2 1 4 3 4 6 0 2-1 4-4 4"/><line x1="12" y1="4" x2="12" y2="21"/></svg>
          </span></div>
          <div class="dwell">
            <svg aria-hidden="true" viewBox="0 0 46 46"><circle class="track" cx="23" cy="23" r="20"/><circle class="fill" cx="23" cy="23" r="20"/></svg>
          </div>
          <div class="body">
            <h3 class="title">🦋 Butterfly Effect</h3>
            <p class="desc">controla o tempo do vídeo com a abertura da mão</p>
          </div>
        </button>

        <button class="card" type="button" data-accent="amber" data-href="shadow.html">
          <div class="preview"><span class="icon">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </span></div>
          <div class="dwell">
            <svg aria-hidden="true" viewBox="0 0 46 46"><circle class="track" cx="23" cy="23" r="20"/><circle class="fill" cx="23" cy="23" r="20"/></svg>
          </div>
          <div class="body">
            <h3 class="title">🌑 Sala de Sombras</h3>
            <p class="desc">a tua sombra vive dentro de uma sala 3D</p>
          </div>
        </button>

        <button class="card" type="button" data-accent="magenta" data-href="draw.html">
          <div class="preview"><span class="icon">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          </span></div>
          <div class="dwell">
            <svg aria-hidden="true" viewBox="0 0 46 46"><circle class="track" cx="23" cy="23" r="20"/><circle class="fill" cx="23" cy="23" r="20"/></svg>
          </div>
          <div class="body">
            <h3 class="title">✍️ Pinch Draw</h3>
            <p class="desc">escreve no ar com luz — aperta o polegar e o indicador</p>
          </div>
        </button>

      </div>
    </section>
  </div>

  <div id="cursor"></div>

  <div id="camPip" hidden>
    <div class="view">
      <video id="cam" playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div id="notice"></div>

<script type="module">
// Links legados partilhados apontam para a raiz como /#cfg=... — antes desta
// home, a raiz ERA a app do Butterfly Effect. Encaminha-os direto lá.
if (/^#cfg=/.test(location.hash)) {
  location.replace("scrub.html" + location.hash);
}

const $ = id => document.getElementById(id);
const stage = $("stage");
const viewAttract = $("viewAttract"), viewSelector = $("viewSelector");
const attractName = $("attractName"), sceneTag = document.querySelector(".scene-tag");
const cards = [...document.querySelectorAll(".card")];
const cam = $("cam"), overlay = $("overlay"), octx = overlay.getContext("2d");
const camPip = $("camPip"), cursorEl = $("cursor"), noticeEl = $("notice");
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

function notice(msg) {
  noticeEl.textContent = msg;
  noticeEl.classList.add("show");
}

/* ================= state machine: attract <-> selector ================= */
let view = "attract";
function setView(name) {
  if (view === name) return;
  view = name;
  viewAttract.hidden = name !== "attract";
  viewSelector.hidden = name !== "selector";
}
function goSelector() { setView("selector"); }

// any click, tap or keypress on the attract screen moves to the selector
document.addEventListener("click", () => { if (view === "attract") goSelector(); });
document.addEventListener("keydown", (e) => {
  if (view === "attract") { goSelector(); return; }
  if (e.key === "Escape" && view === "selector") setView("attract");
});

/* regresso ao attract: instalação não pode ficar presa no seletor — sem
   interação (rato/tecla/mão) durante IDLE_MS, volta ao loop de atração. */
const IDLE_MS = 60000;
let idleTimer = 0;
function bumpIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { if (view === "selector" && !navigated) setView("attract"); }, IDLE_MS);
}
["pointermove", "pointerdown", "keydown"].forEach(ev => document.addEventListener(ev, bumpIdle, { passive: true }));
bumpIdle();

/* ================= attract: cycling experience name ================= */
const EXPERIENCES = [
  { name: "🦋 BUTTERFLY EFFECT", accent: "#5eead4" },
  { name: "🌑 SALA DE SOMBRAS",  accent: "#f59e0b" },
  { name: "✍️ PINCH DRAW",       accent: "#ff4dd2" },
];
let expIdx = 0;
function paintExperience(i) {
  attractName.textContent = EXPERIENCES[i].name;
  // set on the view (not scene-tag) so the ghost-hand, a sibling, inherits it too
  viewAttract.style.setProperty("--exp-accent", EXPERIENCES[i].accent);
}
paintExperience(expIdx);
if (!reduceMotion) {
  setInterval(() => {
    if (view !== "attract") return; // não mexer no DOM escondido
    sceneTag.style.opacity = "0";
    setTimeout(() => {
      expIdx = (expIdx + 1) % EXPERIENCES.length;
      paintExperience(expIdx);
      sceneTag.style.opacity = "1";
    }, 300);
  }, 4200);
}

/* ================= selector cards: click / mouse-dwell / gesture-dwell ================= */
let navigated = false;
function go(href) {
  if (navigated) return;
  navigated = true;
  window.location.href = href;
}
cards.forEach(card => {
  card.addEventListener("click", () => go(card.dataset.href));
  const fillCircle = card.querySelector(".dwell circle.fill");
  let hovering = false;
  card.addEventListener("mouseenter", () => { hovering = true; });
  card.addEventListener("mouseleave", () => { hovering = false; });
  fillCircle.addEventListener("transitionend", e => {
    if (e.propertyName !== "stroke-dashoffset") return;
    if (hovering && card.matches(":hover")) go(card.dataset.href);
  });
});

/* ================= hand tracking ================= */
let landmarker = null, running = false, lastVideoTime = -1;

async function initModel() {
  // dynamic import (not a static top-level import) so a CDN failure can't
  // block anything registered above — click handlers keep working.
  const { FilesetResolver, HandLandmarker } = await import(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs");
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  landmarker = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO", numHands: 2
  });
}

async function startCamera() {
  try {
    await initModel();
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 960, height: 720, facingMode: "user" } });
    cam.srcObject = stream; await cam.play();
    overlay.width = cam.videoWidth; overlay.height = cam.videoHeight;
    camPip.hidden = false;
    cursorEl.style.display = "block";
    running = true;
    stream.getVideoTracks()[0]?.addEventListener("ended", () => {
      running = false; camPip.hidden = true; cursorEl.style.display = "none";
      notice("câmara indisponível — usa o rato ou toca no ecrã");
    });
    loop();
  } catch (e) {
    notice("câmara indisponível — usa o rato ou toca no ecrã");
  }
}
startCamera();

function dist(a, b) { const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0); return Math.hypot(dx, dy, dz); }

/* ---------- thumbs-up detection ---------- */
function isThumbsUp(lm) {
  const handSize = dist(lm[0], lm[9]) || 0.0001;
  // fingertips 8,12,16,20 curled near the wrist
  for (const t of [8, 12, 16, 20]) {
    if (dist(lm[t], lm[0]) / handSize > 1.3) return false;
  }
  // thumb extended away from wrist
  if (dist(lm[4], lm[0]) / handSize < 0.8) return false;
  // thumb pointing up in image space (smaller y = higher on screen)
  if (!(lm[4].y < lm[2].y)) return false;
  return true;
}

// MediaPipe's hands[] order isn't stable across frames — pick the hand whose
// wrist (lm[0]) is nearest to the one tracked last frame (fallback: hands[0]).
function pickCursorHand(hands) {
  if (!cursorTrackWrist) return hands[0];
  let best = hands[0], bestD = Infinity;
  for (const h of hands) {
    const d = dist(h[0], cursorTrackWrist);
    if (d < bestD) { bestD = d; best = h; }
  }
  return best;
}

/* ---------- cursor smoothing ---------- */
let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2;
let cursorInit = false;
const SMOOTH = 0.35;
let cursorTrackWrist = null;  // wrist of the hand tracked last frame
let missedHandFrames = 0;     // consecutive frames with no hand detected
const HAND_MISS_HIDE = 5;     // frames of no hand before the dot hides

/* ---------- thumbs-up debounce + dwell-ring activation ---------- */
let thumbsSince = 0;          // performance.now() when the pose started holding, 0 = not holding
const THUMBS_DEBOUNCE = 150;  // ms pose must hold before it "counts"
const ACTIVATE_MS = 700;      // ms of confirmed hold-over-card to activate
const DASH = 125.6;           // stroke-dasharray of the dwell ring circle
let cooldownUntil = 0;        // performance.now() until which activation is blocked
let hoverCard = null;
let holdStart = 0;            // when confirmed thumbs-up over hoverCard began
let lastFrameAt = 0;          // last processed-frame timestamp (tracking-stall guard)
const FRAME_STALL_MS = 200;   // gap above which the dwell is considered stale

function loop() {
  if (!running) return;
  const now = performance.now();
  if (cam.currentTime !== lastVideoTime) {
    lastVideoTime = cam.currentTime;
    const res = landmarker.detectForVideo(cam, now);
    processHands(res, now);
  }
  requestAnimationFrame(loop);
}

function processHands(res, now) {
  // a gap between processed frames (tab suspend, MediaPipe hiccup) must not
  // let a stale hold insta-activate on the returning frame — reset the dwell.
  const stalled = lastFrameAt && (now - lastFrameAt > FRAME_STALL_MS);
  lastFrameAt = now;
  if (stalled) { thumbsSince = 0; holdStart = 0; }

  octx.clearRect(0, 0, overlay.width, overlay.height);
  const hands = res.landmarks || [];
  const W = overlay.width, H = overlay.height;

  if (!hands.length) {
    thumbsSince = 0;
    cursorTrackWrist = null; // reset hand tracking when no hands
    resetHover();
    missedHandFrames++;
    if (missedHandFrames >= HAND_MISS_HIDE) cursorEl.style.display = "none";
    return;
  }
  missedHandFrames = 0;
  cursorEl.style.display = "block";
  if (view === "attract") goSelector(); // hand detected on attract -> selector
  bumpIdle(); // mão presente conta como interação — não voltar ao attract

  const lm = pickCursorHand(hands); // stable hand identity
  cursorTrackWrist = { x: lm[0].x, y: lm[0].y, z: lm[0].z };

  // draw fingertip landmark on the PiP overlay (mirrored via CSS transform)
  octx.beginPath();
  octx.arc(lm[8].x * W, lm[8].y * H, 8, 0, Math.PI * 2);
  octx.fillStyle = "#5eead4"; octx.fill();
  octx.lineWidth = 2; octx.strokeStyle = "#0009"; octx.stroke();

  const thumbsUp = isThumbsUp(lm);
  if (thumbsUp) {
    if (!thumbsSince) thumbsSince = now;
  } else {
    thumbsSince = 0;
  }
  const confirmedThumbsUp = thumbsSince && (now - thumbsSince >= THUMBS_DEBOUNCE);
  cursorEl.classList.toggle("confirming", !!confirmedThumbsUp);

  // freeze the cursor + hovered target while thumbs-up is confirmed, so
  // entering the pose (which curls lm[8]) can't drag the cursor off the target.
  if (!confirmedThumbsUp) {
    // mirror x: camera is selfie-facing
    const rawX = (1 - lm[8].x) * window.innerWidth;
    const rawY = lm[8].y * window.innerHeight;
    if (!cursorInit) { cursorX = rawX; cursorY = rawY; cursorInit = true; }
    cursorX += (rawX - cursorX) * SMOOTH;
    cursorY += (rawY - cursorY) * SMOOTH;
    cursorEl.style.transform = `translate(${cursorX}px, ${cursorY}px) translate(-50%, -50%)`;

    if (view !== "selector") return;
    const target = cardUnderCursor();
    if (target !== hoverCard) {
      resetHover();
      hoverCard = target;
      if (hoverCard) hoverCard.classList.add("hover");
    }
  }

  if (view !== "selector" || !hoverCard) return;

  if (confirmedThumbsUp && now >= cooldownUntil) {
    if (!holdStart) holdStart = now;
    const elapsed = now - holdStart;
    const pct = Math.min(100, (elapsed / ACTIVATE_MS) * 100);
    const fillCircle = hoverCard.querySelector(".dwell circle.fill");
    hoverCard.classList.add("gesture-dwelling");
    fillCircle.style.strokeDashoffset = DASH * (1 - pct / 100);
    if (elapsed >= ACTIVATE_MS) {
      cooldownUntil = now + 1000;
      go(hoverCard.dataset.href);
    }
  } else {
    holdStart = 0;
    const fillCircle = hoverCard.querySelector(".dwell circle.fill");
    hoverCard.classList.remove("gesture-dwelling");
    fillCircle.style.strokeDashoffset = "";
  }
}

function cardUnderCursor() {
  for (const c of cards) {
    const r = c.getBoundingClientRect();
    if (cursorX >= r.left && cursorX <= r.right && cursorY >= r.top && cursorY <= r.bottom) return c;
  }
  return null;
}

function resetHover() {
  if (hoverCard) {
    hoverCard.classList.remove("gesture-dwelling", "hover");
    const fillCircle = hoverCard.querySelector(".dwell circle.fill");
    fillCircle.style.strokeDashoffset = "";
  }
  hoverCard = null;
  holdStart = 0;
}
</script>
</body>
