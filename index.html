<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hand-scrub — escolhe a experiência</title>
<style>
  :root {
    --panel: #0f1219cc;
    --line: #2a3245;
    --text: #eef2f8;
    --muted: #98a2b6;
    --accent: #5eead4;
    --accent-2: #818cf8;
    --hot: #fb7185;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--text);
    background: radial-gradient(1100px 700px at 50% 24%, #131a2a, #05070a 70%);
  }

  /* ---------- landing layout ---------- */
  #landing {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px; padding: 24px;
    text-align: center;
  }
  #landing h1 {
    font-size: clamp(24px, 4.6vw, 42px); margin: 0; letter-spacing: -.02em;
  }
  #hint {
    color: var(--muted); margin: 0; font-size: 14px;
  }
  #hint b { color: var(--accent); }

  #choices {
    display: flex; gap: 22px; margin-top: 8px; flex-wrap: wrap;
    justify-content: center;
  }

  .choice {
    position: relative; width: min(340px, 42vw); min-width: 240px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 34px 22px; border-radius: 22px; cursor: pointer;
    background: var(--panel); backdrop-filter: blur(10px);
    border: 1px solid var(--line); color: var(--text);
    font-family: inherit; transition: transform .18s, border-color .18s, box-shadow .18s;
    box-shadow: 0 20px 50px -22px #000;
    overflow: hidden;
  }
  .choice .emoji { font-size: 46px; line-height: 1; }
  .choice .title { font-size: 19px; font-weight: 700; letter-spacing: -.01em; }
  .choice .sub { font-size: 13px; color: var(--muted); line-height: 1.4; }
  .choice:hover, .choice.hover {
    transform: translateY(-4px) scale(1.03);
    border-color: var(--accent);
    box-shadow: 0 26px 60px -20px #000, 0 0 0 1px var(--accent) inset;
  }
  .choice:active { transform: translateY(-1px) scale(1.01); }
  .choice:nth-child(2):hover, .choice:nth-child(2).hover { border-color: var(--accent-2); box-shadow: 0 26px 60px -20px #000, 0 0 0 1px var(--accent-2) inset; }

  /* circular activation progress ring, drawn via conic-gradient */
  .choice .ring {
    position: absolute; inset: 0; border-radius: 22px; padding: 3px;
    background: conic-gradient(var(--accent) calc(var(--p, 0) * 1%), transparent 0);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0; pointer-events: none; transition: opacity .12s;
  }
  .choice.hover .ring { opacity: 1; }

  @media (max-width: 620px) {
    #choices { flex-direction: column; align-items: center; }
    .choice { width: min(360px, 84vw); }
  }

  /* ---------- hand cursor ---------- */
  #cursor {
    position: fixed; top: 0; left: 0; width: 26px; height: 26px;
    border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 18px 6px #5eead4aa, 0 0 0 2px #0009;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 200; display: none;
    transition: background .15s;
  }
  #cursor.confirming { background: var(--hot); box-shadow: 0 0 18px 6px #fb718599, 0 0 0 2px #0009; }

  /* ---------- camera PiP ---------- */
  #camPip {
    position: fixed; right: 18px; bottom: 18px; width: 180px; z-index: 150;
    border-radius: 12px; overflow: hidden; border: 1px solid var(--line);
    background: #05070a; box-shadow: 0 16px 40px -16px #000;
  }
  #camPip .view { position: relative; aspect-ratio: 4/3; }
  #camPip video, #camPip canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transform: scaleX(-1);
  }
  #camPip[hidden] { display: none; }

  /* ---------- fallback notice ---------- */
  #notice {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--line); border-radius: 99px;
    padding: 8px 16px; font-size: 12.5px; color: var(--muted); z-index: 160;
    opacity: 0; transition: opacity .3s; pointer-events: none;
    backdrop-filter: blur(10px);
  }
  #notice.show { opacity: 1; }
</style>
</head>
<body>
  <div id="landing">
    <h1>✋ hand-scrub</h1>
    <p id="hint">aponta com o indicador · faz 👍 para entrar</p>
    <div id="choices">
      <button class="choice" id="choiceButterfly" data-href="butterfly.html">
        <div class="ring"></div>
        <div class="emoji">🦋</div>
        <div class="title">BUTTERFLY EFFECT</div>
        <div class="sub">controla o tempo do vídeo com as mãos</div>
      </button>
      <button class="choice" id="choiceHandestro" data-href="handestro.html">
        <div class="ring"></div>
        <div class="emoji">🎼</div>
        <div class="title">HANDESTRO</div>
        <div class="sub">toca música com gestos — 4 instrumentos</div>
      </button>
    </div>
  </div>

  <div id="cursor"></div>

  <div id="camPip" hidden>
    <div class="view">
      <video id="cam" playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div id="notice"></div>

<script type="module">
const $ = id => document.getElementById(id);
const cam = $("cam"), overlay = $("overlay"), octx = overlay.getContext("2d");
const camPip = $("camPip"), cursorEl = $("cursor"), noticeEl = $("notice");
const choices = [$("choiceButterfly"), $("choiceHandestro")];

function notice(msg) {
  noticeEl.textContent = msg;
  noticeEl.classList.add("show");
}

/* ---------- navigation (shared by mouse + gesture) ---------- */
let navigated = false;
function go(href) {
  if (navigated) return;
  navigated = true;
  window.location.href = href;
}
choices.forEach(c => c.addEventListener("click", () => go(c.dataset.href)));

/* ---------- hand tracking ---------- */
let landmarker = null, running = false, lastVideoTime = -1;

async function initModel() {
  // fix 4: dynamic import (not a static top-level import) so a CDN failure can't
  // block anything registered above — click handlers keep working. This call sits
  // inside startCamera()'s try/catch below, which already shows the fallback notice.
  const { FilesetResolver, HandLandmarker } = await import(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs");
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  landmarker = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO", numHands: 2
  });
}

async function startCamera() {
  try {
    await initModel();
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 960, height: 720, facingMode: "user" } });
    cam.srcObject = stream; await cam.play();
    overlay.width = cam.videoWidth; overlay.height = cam.videoHeight;
    camPip.hidden = false;
    cursorEl.style.display = "block";
    running = true;
    stream.getVideoTracks()[0]?.addEventListener("ended", () => {
      running = false; camPip.hidden = true; cursorEl.style.display = "none";
      notice("câmara indisponível — usa o rato");
    });
    loop();
  } catch (e) {
    notice("câmara indisponível — usa o rato");
  }
}
startCamera();

function dist(a, b) { const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0); return Math.hypot(dx, dy, dz); }

/* ---------- thumbs-up detection ---------- */
function isThumbsUp(lm) {
  const handSize = dist(lm[0], lm[9]) || 0.0001;
  // fingertips 8,12,16,20 curled near the wrist
  for (const t of [8, 12, 16, 20]) {
    if (dist(lm[t], lm[0]) / handSize > 1.3) return false;
  }
  // thumb extended away from wrist
  if (dist(lm[4], lm[0]) / handSize < 0.8) return false;
  // thumb pointing up in image space (smaller y = higher on screen)
  if (!(lm[4].y < lm[2].y)) return false;
  return true;
}

// fix 3: MediaPipe's hands[] order isn't stable across frames — pick the hand
// whose wrist (lm[0]) is nearest to the one tracked last frame (fallback: hands[0]).
function pickCursorHand(hands) {
  if (!cursorTrackWrist) return hands[0];
  let best = hands[0], bestD = Infinity;
  for (const h of hands) {
    const d = dist(h[0], cursorTrackWrist);
    if (d < bestD) { bestD = d; best = h; }
  }
  return best;
}

/* ---------- cursor smoothing ---------- */
let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2;
let cursorInit = false;
const SMOOTH = 0.35;
let cursorTrackWrist = null;  // fix 3: wrist of the hand tracked last frame
let missedHandFrames = 0;     // fix 6: consecutive frames with no hand detected
const HAND_MISS_HIDE = 5;     // frames of no hand before the dot hides

/* ---------- thumbs-up debounce + activation ring ---------- */
let thumbsSince = 0;          // performance.now() when the pose started holding, 0 = not holding
const THUMBS_DEBOUNCE = 150;  // ms pose must hold before it "counts"
const ACTIVATE_MS = 700;      // ms of confirmed hold-over-button to activate
let cooldownUntil = 0;        // performance.now() until which activation is blocked
let hoverChoice = null;
let holdStart = 0;            // when confirmed thumbs-up over hoverChoice began
let lastFrameAt = 0;          // fix 2: last processed-frame timestamp (tracking-stall guard)
const FRAME_STALL_MS = 200;   // gap above which the dwell is considered stale

function loop() {
  if (!running) return;
  const now = performance.now();
  if (cam.currentTime !== lastVideoTime) {
    lastVideoTime = cam.currentTime;
    const res = landmarker.detectForVideo(cam, now);
    processHands(res, now);
  }
  requestAnimationFrame(loop);
}

function processHands(res, now) {
  // fix 2: a gap between processed frames (tab suspend, MediaPipe hiccup) must not
  // let a stale hold insta-activate on the returning frame — reset the dwell.
  const stalled = lastFrameAt && (now - lastFrameAt > FRAME_STALL_MS);
  lastFrameAt = now;
  if (stalled) { thumbsSince = 0; holdStart = 0; }

  octx.clearRect(0, 0, overlay.width, overlay.height);
  const hands = res.landmarks || [];
  const W = overlay.width, H = overlay.height;

  if (!hands.length) {
    thumbsSince = 0;
    cursorTrackWrist = null; // fix 3: reset hand tracking when no hands
    resetHover();
    missedHandFrames++;
    if (missedHandFrames >= HAND_MISS_HIDE) cursorEl.style.display = "none"; // fix 6
    return;
  }
  missedHandFrames = 0;
  cursorEl.style.display = "block";

  const lm = pickCursorHand(hands); // fix 3: stable hand identity
  cursorTrackWrist = { x: lm[0].x, y: lm[0].y, z: lm[0].z };

  // draw fingertip landmark on the PiP overlay (mirrored via CSS transform)
  octx.beginPath();
  octx.arc(lm[8].x * W, lm[8].y * H, 8, 0, Math.PI * 2);
  octx.fillStyle = "#5eead4"; octx.fill();
  octx.lineWidth = 2; octx.strokeStyle = "#0009"; octx.stroke();

  const thumbsUp = isThumbsUp(lm);
  if (thumbsUp) {
    if (!thumbsSince) thumbsSince = now;
  } else {
    thumbsSince = 0;
  }
  const confirmedThumbsUp = thumbsSince && (now - thumbsSince >= THUMBS_DEBOUNCE);
  cursorEl.classList.toggle("confirming", !!confirmedThumbsUp);

  // fix 1: freeze the cursor + hovered target while thumbs-up is confirmed, so
  // entering the pose (which curls lm[8]) can't drag the cursor off the target.
  if (!confirmedThumbsUp) {
    // mirror x: camera is selfie-facing
    const rawX = (1 - lm[8].x) * window.innerWidth;
    const rawY = lm[8].y * window.innerHeight;
    if (!cursorInit) { cursorX = rawX; cursorY = rawY; cursorInit = true; }
    cursorX += (rawX - cursorX) * SMOOTH;
    cursorY += (rawY - cursorY) * SMOOTH;
    cursorEl.style.transform = `translate(${cursorX}px, ${cursorY}px) translate(-50%, -50%)`;

    const target = choiceUnderCursor();
    if (target !== hoverChoice) {
      resetHover();
      hoverChoice = target;
    }
  }

  if (!hoverChoice) return;

  if (confirmedThumbsUp && now >= cooldownUntil) {
    if (!holdStart) holdStart = now;
    const elapsed = now - holdStart;
    const pct = Math.min(100, (elapsed / ACTIVATE_MS) * 100);
    hoverChoice.style.setProperty("--p", pct.toFixed(1));
    if (elapsed >= ACTIVATE_MS) {
      cooldownUntil = now + 1000;
      go(hoverChoice.dataset.href);
    }
  } else {
    holdStart = 0;
    hoverChoice.style.setProperty("--p", "0");
  }
}

function choiceUnderCursor() {
  for (const c of choices) {
    const r = c.getBoundingClientRect();
    if (cursorX >= r.left && cursorX <= r.right && cursorY >= r.top && cursorY <= r.bottom) {
      c.classList.add("hover");
      return c;
    }
    c.classList.remove("hover");
  }
  return null;
}

function resetHover() {
  if (hoverChoice) {
    hoverChoice.classList.remove("hover");
    hoverChoice.style.setProperty("--p", "0");
  }
  hoverChoice = null;
  holdStart = 0;
}
</script>
</body>
</html>
