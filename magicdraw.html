<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Magic Draw — painel de controlo</title>
<style>
  :root {
    --bg: #07080d;
    --panel: #12141dcc;
    --line: #2a3245;
    --text: #eef2f8;
    --muted: #98a2b6;
    --neon: #00ffcc;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; background: var(--bg); overflow-x: hidden;
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--text);
    display: flex; flex-direction: column; gap: 14px;
    padding: 14px; padding-top: 56px;
    min-height: 100vh;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(0,255,204,.10), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(255,77,210,.10), transparent 60%),
      var(--bg);
  }

  a#back {
    position: fixed; top: 14px; left: 14px; z-index: 95; text-decoration: none;
    color: var(--text); background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 700;
    backdrop-filter: blur(10px);
  }
  #status {
    position: fixed; top: 14px; right: 14px; z-index: 95;
    background: var(--panel); border: 1px solid var(--line); border-radius: 99px;
    padding: 8px 14px; font-size: 13px; font-weight: 600; backdrop-filter: blur(10px);
    white-space: nowrap;
  }

  h2.section {
    margin: 4px 2px 0; font-size: 13px; font-weight: 800; letter-spacing: .04em;
    text-transform: uppercase; color: var(--muted);
  }

  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 18px;
    padding: 12px; backdrop-filter: blur(10px);
  }

  /* ---------- botão base: toque grande, feedback tátil ---------- */
  button {
    font-family: inherit; color: var(--text); background: #1a1e2ac0;
    border: 2px solid var(--line); border-radius: 16px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
  }
  button:active { transform: scale(.92); }

  /* ---------- pinceis: grelha responsiva, alvo >=90px ---------- */
  #brushes { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 10px; }
  #brushes button { min-height: 96px; font-size: 12px; font-weight: 700; padding: 8px 4px; }
  #brushes button .ic { font-size: 32px; line-height: 1; }
  #brushes button.on {
    border-color: var(--neon); background: #0f2b26;
    box-shadow: 0 0 0 3px #00ffcc33, 0 0 22px -2px var(--neon);
  }

  /* ---------- cores: swatches redondos, caixa de lápis ---------- */
  #colors { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .swatch {
    width: 90px; height: 90px; min-width: 90px; border-radius: 50%;
    border: 3px solid #0000; box-shadow: inset 0 0 0 1px #ffffff22;
    padding: 0;
  }
  .swatch.on { border-color: #fff; box-shadow: 0 0 0 3px #ffffff55, 0 0 18px -2px currentColor; transform: scale(1.08); }
  .swatch.rainbow { background: conic-gradient(red, orange, yellow, lime, cyan, blue, magenta, red); }

  /* ---------- tamanhos: bolas crescentes ---------- */
  #sizes { display: flex; gap: 10px; justify-content: center; }
  #sizes button { flex: 1; min-height: 90px; }
  #sizes button .dot { border-radius: 50%; background: var(--neon); }
  #sizes button.on { border-color: var(--neon); background: #0f2b26; box-shadow: 0 0 0 3px #00ffcc33; }
  #sizes button .lbl { font-size: 11px; color: var(--muted); font-weight: 700; }

  /* ---------- simetria: segmentado ---------- */
  #mirrors { display: flex; gap: 10px; }
  #mirrors button { flex: 1; min-height: 90px; font-size: 15px; font-weight: 800; }
  #mirrors button .ic { font-size: 26px; }
  #mirrors button.on { border-color: var(--neon); background: #0f2b26; box-shadow: 0 0 0 3px #00ffcc33; }

  /* ---------- ações: foto / limpar ---------- */
  #actions { display: flex; gap: 10px; }
  #actions button { flex: 1; min-height: 100px; font-size: 16px; font-weight: 800; }
  #photoBtn { background: linear-gradient(160deg, #2a1f00, #1a1e2ac0); border-color: #ffd23f55; }
  #photoBtn .ic { font-size: 34px; }
  #photoBtn.busy { border-color: #ffd23f; box-shadow: 0 0 22px -2px #ffd23f; }
  #clearBtn { background: linear-gradient(160deg, #2a0f14, #1a1e2ac0); border-color: #ff4d5555; }
  #clearBtn .ic { font-size: 34px; }
  #clearBtn.confirm { border-color: #ff4d55; background: #3a0f14; box-shadow: 0 0 22px -2px #ff4d55; }

  /* ---------- pré-visualização ---------- */
  #previewWrap { display: flex; align-items: center; gap: 10px; }
  canvas#preview { width: 100%; height: 90px; border-radius: 12px; background: #000; display: block; }

  footer { text-align: center; color: var(--muted); font-size: 11px; padding: 4px 0 2px; }

  /* ---------- botão admin: discreto, num canto, só reage a long-press ---------- */
  #adminGearBtn {
    position: fixed; right: 12px; bottom: 12px; z-index: 40;
    width: 44px; height: 44px; min-height: 0; border-radius: 50%;
    background: #1a1e2a99; border: 1px solid var(--line); opacity: .45;
    font-size: 18px; padding: 0; touch-action: none;
  }
  #adminGearBtn::before {
    content: ""; position: absolute; inset: -2px; border-radius: 50%;
    background: conic-gradient(var(--neon) calc(var(--p, 0) * 1%), transparent 0);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
    pointer-events: none;
  }

  /* ---------- overlay admin: zonas de oclusão ---------- */
  #adminOverlay {
    position: fixed; inset: 0; z-index: 200; background: #05060ae6;
    display: flex; align-items: center; justify-content: center;
    padding: 14px; backdrop-filter: blur(6px);
  }
  #adminOverlay[hidden] { display: none; }
  .admin-panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: 18px;
    padding: 14px; display: flex; flex-direction: column; gap: 12px;
    max-width: 720px; width: 100%; backdrop-filter: blur(10px);
  }
  .admin-panel p.hint {
    margin: 0; color: var(--muted); font-size: 12px; text-align: center;
  }
  #adminCanvas {
    width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px;
    touch-action: none; display: block;
  }
  #adminActions { display: flex; flex-wrap: wrap; gap: 10px; }
  #adminActions button { flex: 1; min-width: 90px; min-height: 60px; font-size: 12px; font-weight: 800; }
  #adminActions button:disabled { opacity: .35; }
  #zoneAddBtn, #zoneCircleBtn { border-color: #00ffcc55; }
  #zoneDelBtn, #zonePointDelBtn { border-color: #ff4d5555; }
  #zoneCurveBtn.on { border-color: var(--neon); background: #0f2b26; box-shadow: 0 0 0 3px #00ffcc33; }
  #zoneDoneBtn { border-color: #00ffcc; background: #0f2b26; flex-basis: 100%; }
</style>
</head>
<body>
  <a id="back" href="index.html">← voltar</a>
  <div id="status">🟡 só local</div>

  <h2 class="section">✏️ Pincéis</h2>
  <div class="card"><div id="brushes"></div></div>

  <h2 class="section">🎨 Cores</h2>
  <div class="card"><div id="colors"></div></div>

  <h2 class="section">⚪ Tamanho</h2>
  <div class="card"><div id="sizes"></div></div>

  <h2 class="section">❄️ Simetria</h2>
  <div class="card"><div id="mirrors"></div></div>

  <h2 class="section">👁️ Pré-visualização</h2>
  <div class="card" id="previewWrap"><canvas id="preview"></canvas></div>

  <div id="actions">
    <button id="photoBtn"><span class="ic">📸</span><span>Foto</span></button>
    <button id="clearBtn"><span class="ic">🗑</span><span>Limpar</span></button>
  </div>

  <footer>Magic Draw · painel touch</footer>
  <button id="adminGearBtn" aria-label="Modo admin: zonas de oclusão (mantém premido 3s)">⚙️</button>

  <!-- ================= overlay admin: zonas de oclusão (janelas/portas) ================= -->
  <div id="adminOverlay" hidden>
    <div class="admin-panel">
      <h2 class="section">🪟 Zonas de oclusão</h2>
      <canvas id="adminCanvas"></canvas>
      <p class="hint">Arrasta um vértice para moldar · toca num "+" da aresta para inserir ponto · toca dentro para selecionar</p>
      <div id="adminActions">
        <button id="zoneAddBtn">➕<br>Criar zona</button>
        <button id="zoneCircleBtn">⭕<br>Criar círculo</button>
        <button id="zoneCurveBtn" disabled>◠<br>Curvas</button>
        <button id="zonePointDelBtn" disabled>−<br>Ponto</button>
        <button id="zoneDelBtn" disabled>🗑<br>Apagar</button>
        <button id="zoneDoneBtn">✔<br>Concluir</button>
      </div>
    </div>
  </div>

<script type="module">
/* ==================================================================
   Magic Draw — painel de controlo (touch-only, sem câmara)
   Emite o estado em tempo real para magicdraw-display.html via dois
   canais: BroadcastChannel local + Supabase Realtime Broadcast.
   ================================================================== */
const $ = id => document.getElementById(id);

/* ================= protocolo de sync ================= */
/* ?room=X emparelha este tablet com a projeção que abriu o mesmo room —
   sem isto, todas as instalações (e qualquer visitante da página pública)
   partilhariam um único stream de comandos. */
const ROOM = (new URLSearchParams(location.search).get("room") || "default").replace(/[^\w-]/g, "") || "default";
const CLIENT_ID = Math.random().toString(36).slice(2, 10); // 8 chars
let seq = 0;

const bc = new BroadcastChannel("magicdraw:" + ROOM);
bc.onmessage = e => onMsg(e.data);

const SB_URL = "https://rvcvyeodglovmptcuyiz.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2Y3Z5ZW9kZ2xvdm1wdGN1eWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY1MzE0MTEsImV4cCI6MjA2MjEwNzQxMX0.nxD3rsoaYbLJratlmxJvaiUq8iKwXFr8-BPCmxfQBv0";
const SB_HDRS = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" };
const statusEl = $("status");
let sbChannel = null;

(async () => {
  try {
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
    const sb = createClient(SB_URL, SB_KEY);
    sbChannel = sb.channel("magicdraw:" + ROOM);
    sbChannel
      .on("broadcast", { event: "msg" }, ({ payload }) => onMsg(payload))
      .subscribe(status => {
        if (status === "SUBSCRIBED") { statusEl.textContent = "🟢 ligado"; }
        else if (status === "CLOSED" || status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
          statusEl.textContent = "🟡 só local";
        }
      });
  } catch {
    statusEl.textContent = "🟡 só local"; // sem rede: BroadcastChannel local continua a funcionar
  }
})();

// dedup no recetor: última seq vista por src
const lastSeq = new Map();
function onMsg(msg) {
  if (!msg || msg.v !== 1 || msg.src === CLIENT_ID) return;
  const prev = lastSeq.get(msg.src) ?? -1;
  if (msg.seq <= prev) return;
  lastSeq.set(msg.src, msg.seq);
  if (msg.kind === "hello") sendState(); // display pediu o estado atual
}

function send(payload) {
  const msg = { v: 1, src: CLIENT_ID, seq: seq++, ...payload };
  bc.postMessage(msg);
  sbChannel?.send({ type: "broadcast", event: "msg", payload: msg });
}

/* ================= estado ================= */
const state = { tool: "neon", color: "#00ffcc", size: 14, mirror: 0 };
let lastNonRainbowTool = "neon";

function sendState() { send({ kind: "state", state: { ...state } }); }

/* keepalive a cada 3s */
setInterval(sendState, 3000);

/* ================= pincéis ================= */
const BRUSHES = [
  { tool: "neon",    ic: "✨", label: "Néon" },
  { tool: "rainbow", ic: "🌈", label: "Arco-íris" },
  { tool: "glitter", ic: "⭐", label: "Brilhos" },
  { tool: "stamp",   ic: "🦋", label: "Carimbos" },
  { tool: "spray",   ic: "🎨", label: "Spray" },
  { tool: "marker",  ic: "🖊️", label: "Marcador" },
  { tool: "crayon",  ic: "🖍️", label: "Lápis de cera" },
  { tool: "eraser",  ic: "🧽", label: "Borracha" },
];
const brushesEl = $("brushes");
for (const b of BRUSHES) {
  const btn = document.createElement("button");
  btn.dataset.tool = b.tool;
  btn.innerHTML = `<span class="ic">${b.ic}</span><span>${b.label}</span>`;
  btn.onclick = () => {
    state.tool = b.tool;
    if (b.tool !== "rainbow") lastNonRainbowTool = b.tool;
    renderBrushes(); renderColors(); renderPreview(); sendState();
  };
  brushesEl.appendChild(btn);
}
function renderBrushes() {
  for (const btn of brushesEl.children) btn.classList.toggle("on", btn.dataset.tool === state.tool);
}

/* ================= cores ================= */
const COLORS = [
  "#ffffff", "#ff3b3b", "#ff9500", "#ffee00", "#c6ff00", "#39ff14", "#00ffb3",
  "#00e5ff", "#2979ff", "#0040ff", "#8a2be2", "#b026ff", "#ff2d95", "#ff00c8",
];
const colorsEl = $("colors");
for (const c of COLORS) {
  const btn = document.createElement("button");
  btn.className = "swatch";
  btn.style.background = c;
  btn.style.color = c;
  btn.dataset.color = c;
  btn.onclick = () => {
    state.color = c;
    state.tool = state.tool === "rainbow" ? lastNonRainbowTool : state.tool; // escolher cor sólida sai do modo arco-íris
    renderBrushes(); renderColors(); renderPreview(); sendState();
  };
  colorsEl.appendChild(btn);
}
const rainbowBtn = document.createElement("button");
rainbowBtn.className = "swatch rainbow";
rainbowBtn.dataset.rainbow = "1";
rainbowBtn.onclick = () => {
  state.tool = "rainbow"; // mantém o último 'color' escolhido
  renderBrushes(); renderColors(); renderPreview(); sendState();
};
colorsEl.appendChild(rainbowBtn);
function renderColors() {
  for (const btn of colorsEl.children) {
    const isRainbowSwatch = btn.dataset.rainbow === "1";
    if (isRainbowSwatch) { btn.classList.toggle("on", state.tool === "rainbow"); continue; }
    btn.classList.toggle("on", state.tool !== "rainbow" && btn.dataset.color === state.color);
  }
}

/* ================= tamanhos: bolas crescentes ================= */
const SIZES = [6, 14, 26, 44];
const sizesEl = $("sizes");
for (const s of SIZES) {
  const btn = document.createElement("button");
  btn.dataset.size = s;
  const px = Math.round(14 + s * 0.9); // bola desenhada à escala, limitada ao botão
  btn.innerHTML = `<span class="dot" style="width:${px}px;height:${px}px"></span><span class="lbl">${s}px</span>`;
  btn.onclick = () => { state.size = s; renderSizes(); renderPreview(); sendState(); };
  sizesEl.appendChild(btn);
}
function renderSizes() {
  for (const btn of sizesEl.children) btn.classList.toggle("on", +btn.dataset.size === state.size);
}

/* ================= simetria ================= */
const MIRRORS = [
  { m: 0, ic: "✖️", label: "Off" },
  { m: 2, ic: "❄️", label: "2×" },
  { m: 4, ic: "❄️", label: "4×" },
  { m: 8, ic: "❄️", label: "8×" },
];
const mirrorsEl = $("mirrors");
for (const mv of MIRRORS) {
  const btn = document.createElement("button");
  btn.dataset.mirror = mv.m;
  btn.innerHTML = `<span class="ic">${mv.ic}</span><span>${mv.label}</span>`;
  btn.onclick = () => { state.mirror = mv.m; renderMirrors(); sendState(); };
  mirrorsEl.appendChild(btn);
}
function renderMirrors() {
  for (const btn of mirrorsEl.children) btn.classList.toggle("on", +btn.dataset.mirror === state.mirror);
}

/* ================= pré-visualização (rabisco em S) ================= */
const preview = $("preview"), pctx = preview.getContext("2d");
function sizePreview() {
  const dpr = window.devicePixelRatio || 1;
  const w = preview.clientWidth, h = preview.clientHeight;
  preview.width = w * dpr; preview.height = h * dpr;
  pctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
// pontos de uma curva em S, usados como base para todos os pincéis
function sPath(w, h) {
  const pts = [];
  const n = 60;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const x = 16 + t * (w - 32);
    const y = h / 2 + Math.sin(t * Math.PI * 2) * (h * 0.28);
    pts.push({ x, y });
  }
  return pts;
}
function renderPreview() {
  const w = preview.clientWidth, h = preview.clientHeight;
  sizePreview();
  pctx.clearRect(0, 0, w, h);
  pctx.fillStyle = "#000"; pctx.fillRect(0, 0, w, h);
  const pts = sPath(w, h);
  const size = state.size;

  if (state.tool === "eraser") {
    // contorno tracejado: mostra "por onde passaria" sem desenhar tinta
    pctx.strokeStyle = "#ffffff88"; pctx.lineWidth = Math.max(2, size * 0.6);
    pctx.setLineDash([6, 8]); pctx.lineCap = "round"; pctx.lineJoin = "round";
    pctx.beginPath();
    pts.forEach((p, i) => i ? pctx.lineTo(p.x, p.y) : pctx.moveTo(p.x, p.y));
    pctx.stroke();
    pctx.setLineDash([]);
    return;
  }

  if (state.tool === "stamp") {
    // carimbos: emojis espaçados ao longo da curva
    const emojis = ["🦋", "⭐", "🌸", "💫"];
    pctx.font = `${Math.max(14, size)}px sans-serif`;
    pctx.textAlign = "center"; pctx.textBaseline = "middle";
    for (let i = 0; i < pts.length; i += 10) {
      pctx.fillText(emojis[((i / 10) | 0) % emojis.length], pts[i].x, pts[i].y);
    }
    return;
  }

  if (state.tool === "spray") {
    // spray: nuvem de pontinhos à volta da curva
    pctx.fillStyle = state.color;
    for (const p of pts) {
      for (let k = 0; k < 4; k++) {
        const a = Math.random() * Math.PI * 2, r = Math.random() * (size * 0.7);
        pctx.beginPath();
        pctx.arc(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r, 1.2, 0, Math.PI * 2);
        pctx.fill();
      }
    }
    return;
  }

  pctx.lineCap = "round"; pctx.lineJoin = "round";
  pctx.beginPath();
  pts.forEach((p, i) => i ? pctx.lineTo(p.x, p.y) : pctx.moveTo(p.x, p.y));

  if (state.tool === "rainbow") {
    const grad = pctx.createLinearGradient(0, 0, w, 0);
    ["red", "orange", "yellow", "lime", "cyan", "blue", "magenta"].forEach((c, i, arr) => grad.addColorStop(i / (arr.length - 1), c));
    pctx.strokeStyle = grad; pctx.lineWidth = size; pctx.globalAlpha = 1;
    pctx.shadowColor = "#fff"; pctx.shadowBlur = 6;
    pctx.stroke();
  } else if (state.tool === "neon") {
    pctx.strokeStyle = state.color; pctx.lineWidth = Math.max(2, size * 0.5);
    pctx.shadowColor = state.color; pctx.shadowBlur = 18;
    pctx.stroke();
    pctx.shadowBlur = 0;
  } else if (state.tool === "glitter") {
    pctx.strokeStyle = state.color; pctx.lineWidth = Math.max(2, size * 0.35);
    pctx.shadowColor = "#fff"; pctx.shadowBlur = 10;
    pctx.stroke();
    pctx.shadowBlur = 0;
    pctx.fillStyle = "#fff";
    for (let i = 0; i < pts.length; i += 4) {
      pctx.beginPath();
      pctx.arc(pts[i].x + (Math.random() - 0.5) * size, pts[i].y + (Math.random() - 0.5) * size, 1.4, 0, Math.PI * 2);
      pctx.fill();
    }
  } else if (state.tool === "marker") {
    pctx.strokeStyle = state.color; pctx.lineWidth = size; pctx.globalAlpha = 0.55;
    pctx.stroke();
    pctx.globalAlpha = 1;
  } else if (state.tool === "crayon") {
    // lápis de cera: linha com jitter (textura granulada)
    pctx.strokeStyle = state.color; pctx.lineWidth = Math.max(2, size * 0.7); pctx.globalAlpha = 0.85;
    pctx.stroke();
    pctx.globalAlpha = 1;
    pctx.fillStyle = state.color;
    for (const p of pts) {
      pctx.beginPath();
      pctx.arc(p.x + (Math.random() - 0.5) * 3, p.y + (Math.random() - 0.5) * 3, 0.8, 0, Math.PI * 2);
      pctx.fill();
    }
  } else {
    pctx.strokeStyle = state.color; pctx.lineWidth = size;
    pctx.stroke();
  }
}
window.addEventListener("resize", renderPreview);

/* ================= foto: contagem visual 3-2-1 ================= */
const photoBtn = $("photoBtn");
let photoBusy = false;
photoBtn.onclick = () => {
  if (photoBusy) return;
  photoBusy = true;
  photoBtn.classList.add("busy");
  send({ kind: "photo" });
  const label = photoBtn.querySelector("span:last-child");
  const original = label.textContent;
  let n = 3;
  label.textContent = `${n}…`;
  const t = setInterval(() => {
    n--;
    if (n > 0) { label.textContent = `${n}…`; return; }
    label.textContent = "📸";
    clearInterval(t);
    setTimeout(() => {
      photoBusy = false;
      photoBtn.classList.remove("busy");
      label.textContent = original;
    }, 600);
  }, 700);
};

/* ================= limpar: confirmação anti-toque-acidental ================= */
const clearBtn = $("clearBtn");
let clearArmed = false, clearTimer = null;
const clearLabel = clearBtn.querySelector("span:last-child");
const clearOriginal = clearLabel.textContent;
clearBtn.onclick = () => {
  if (!clearArmed) {
    clearArmed = true;
    clearBtn.classList.add("confirm");
    clearLabel.textContent = "Confirmar?";
    clearTimer = setTimeout(resetClear, 3000);
    return;
  }
  clearTimeout(clearTimer);
  resetClear();
  send({ kind: "clear" });
};
function resetClear() {
  clearArmed = false;
  clearBtn.classList.remove("confirm");
  clearLabel.textContent = clearOriginal;
}

/* ==================================================================
   Zonas de oclusão (janelas/portas do edifício) — modo admin
   Estado totalmente à parte do desenho (tool/color/etc.): não mexe em
   `state` nem no keepalive de sendState() acima.
   ================================================================== */
// Duas formas, normalizadas 0–1:
//   poly:    { id, type:'poly', pts:[[x,y]xN] (N>=3), smooth }
//   ellipse: { id, type:'ellipse', cx, cy, rx, ry, rot }  (rx à largura, ry à altura)
let zones = [];
let selectedZoneId = null;
let selectedVertexIdx = null; // vértice tocado (só poly) — para "− Ponto"
let adminOpen = false;

// zonas antigas (antes do type/smooth existirem) contam como poly reto
function normalizeZone(z) {
  if (!z) return z;
  if (z.type === "ellipse") return z;
  return { id: z.id, type: "poly", pts: z.pts, smooth: !!z.smooth };
}

/* ---- traçado do contorno: TEM de ser igual ao de magicdraw-display.html
   (o que o admin vê no tablet tem de bater certo com o projetado) ---- */
function tracePolyPath(ctx, pts, w, h, smooth) {
  const n = pts.length;
  const P = pts.map(([x, y]) => [x * w, y * h]);
  ctx.beginPath();
  if (!smooth || n < 3) {
    P.forEach((p, i) => (i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1])));
    ctx.closePath();
    return;
  }
  // spline Catmull-Rom fechada, convertida em beziers (wrap-around pelos N pontos)
  ctx.moveTo(P[0][0], P[0][1]);
  for (let i = 0; i < n; i++) {
    const p0 = P[(i - 1 + n) % n], p1 = P[i], p2 = P[(i + 1) % n], p3 = P[(i + 2) % n];
    const cp1x = p1[0] + (p2[0] - p0[0]) / 6, cp1y = p1[1] + (p2[1] - p0[1]) / 6;
    const cp2x = p2[0] - (p3[0] - p1[0]) / 6, cp2y = p2[1] - (p3[1] - p1[1]) / 6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
  }
  ctx.closePath();
}
function traceZonePath(ctx, z, w, h) {
  if (z.type === "ellipse") {
    ctx.beginPath();
    ctx.ellipse(z.cx * w, z.cy * h, Math.max(0.001, z.rx * w), Math.max(0.001, z.ry * h), z.rot || 0, 0, Math.PI * 2);
    return;
  }
  tracePolyPath(ctx, z.pts, w, h, !!z.smooth);
}
// pegas em pixels: vértices reais (poly) ou centro+eixo-rx+eixo-ry (ellipse)
function zoneHandlesPx(z, w, h) {
  if (z.type === "ellipse") {
    const cx = z.cx * w, cy = z.cy * h, rx = z.rx * w, ry = z.ry * h, rot = z.rot || 0;
    return [
      { x: cx, y: cy, kind: "center" },
      { x: cx + rx * Math.cos(rot), y: cy + rx * Math.sin(rot), kind: "rx" },
      { x: cx - ry * Math.sin(rot), y: cy + ry * Math.cos(rot), kind: "ry" },
    ];
  }
  return z.pts.map(([x, y], idx) => ({ x: x * w, y: y * h, kind: "vertex", idx }));
}
// pegas "+" nos pontos médios das arestas (só poly) — tocar insere um vértice ali
function zoneMidpointsPx(z, w, h) {
  if (z.type !== "poly") return [];
  const n = z.pts.length;
  return z.pts.map(([x, y], i) => {
    const [x2, y2] = z.pts[(i + 1) % n];
    return { x: ((x + x2) / 2) * w, y: ((y + y2) / 2) * h, edgeAfter: i };
  });
}
const clamp01 = v => Math.min(1, Math.max(0, v));

/* ---- persistência cloud (Supabase · hand_config, id "magicdraw-zones") ---- */
const ZONES_ID = "magicdraw-zones";
let zonesCloudSaveT = 0;
async function zonesCloudLoad() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/hand_config?id=eq.${ZONES_ID}&select=data`, { headers: SB_HDRS });
    if (!r.ok) return;
    const cfg = (await r.json())[0]?.data;
    if (cfg?.zones) zones = cfg.zones.map(normalizeZone);
  } catch { /* offline: começa sem zonas guardadas, a próxima gravação recupera */ }
}
function zonesCloudSave() {
  clearTimeout(zonesCloudSaveT);
  zonesCloudSaveT = setTimeout(async () => {
    try {
      await fetch(`${SB_URL}/rest/v1/hand_config`, {
        method: "POST",
        headers: { ...SB_HDRS, Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify([{ id: ZONES_ID, data: { zones }, updated_at: new Date().toISOString() }]),
      });
    } catch { /* offline: fica só emitido ao vivo, tenta gravar na próxima mudança */ }
  }, 1000);
}

/* ---- emissão em tempo real (protocolo kind:'zones', mesmos dois canais) ---- */
const r4 = n => +n.toFixed(4);
function sendZones(editing) {
  send({
    kind: "zones",
    zones: zones.map(z => z.type === "ellipse"
      ? { id: z.id, type: "ellipse", cx: r4(z.cx), cy: r4(z.cy), rx: r4(z.rx), ry: r4(z.ry), rot: r4(z.rot || 0) }
      : { id: z.id, type: "poly", pts: z.pts.map(([x, y]) => [r4(x), r4(y)]), smooth: !!z.smooth }),
    editing,
  });
}
// throttle ~80ms durante drags (leading + trailing, para não perder o último ponto)
let zonesThrottleTimer = null, zonesThrottlePending = false;
function sendZonesThrottled() {
  if (zonesThrottleTimer) { zonesThrottlePending = true; return; }
  sendZones(true);
  zonesThrottleTimer = setTimeout(() => {
    zonesThrottleTimer = null;
    if (zonesThrottlePending) { zonesThrottlePending = false; sendZones(true); }
  }, 80);
}

/* ---- canvas 16:9 do overlay: representa o ecrã do display ---- */
const adminOverlay = $("adminOverlay"), adminCanvas = $("adminCanvas"), actx = adminCanvas.getContext("2d");
function sizeAdminCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = adminCanvas.clientWidth, h = adminCanvas.clientHeight;
  adminCanvas.width = w * dpr; adminCanvas.height = h * dpr;
  actx.setTransform(dpr, 0, 0, dpr, 0, 0);
  renderAdminCanvas();
}
function renderAdminCanvas() {
  const w = adminCanvas.clientWidth, h = adminCanvas.clientHeight;
  actx.clearRect(0, 0, w, h);
  actx.fillStyle = "#000"; actx.fillRect(0, 0, w, h);
  for (const z of zones) {
    const selected = z.id === selectedZoneId;
    traceZonePath(actx, z, w, h);
    actx.fillStyle = selected ? "rgba(255,45,85,0.55)" : "rgba(255,30,80,0.35)";
    actx.fill();
    actx.strokeStyle = selected ? "#ff2d55" : "#ff2d5599";
    actx.lineWidth = selected ? 3 : 2;
    actx.stroke();
    for (const hpt of zoneHandlesPx(z, w, h)) {
      const isSelVertex = selected && hpt.kind === "vertex" && hpt.idx === selectedVertexIdx;
      actx.beginPath();
      actx.arc(hpt.x, hpt.y, isSelVertex ? 13 : 10, 0, Math.PI * 2);
      actx.fillStyle = isSelVertex ? "#fff" : "#ff2d55"; actx.fill();
      actx.strokeStyle = isSelVertex ? "#ff2d55" : "#fff"; actx.lineWidth = 1.5; actx.stroke();
    }
    // pegas "+" de inserção de vértice — só na zona selecionada, tipo poly
    if (selected && z.type === "poly") {
      for (const mp of zoneMidpointsPx(z, w, h)) {
        actx.beginPath(); actx.arc(mp.x, mp.y, 9, 0, Math.PI * 2);
        actx.fillStyle = "#00ffcc55"; actx.fill();
        actx.strokeStyle = "#00ffcc"; actx.lineWidth = 1.5; actx.stroke();
        actx.fillStyle = "#00ffcc"; actx.font = "bold 13px sans-serif";
        actx.textAlign = "center"; actx.textBaseline = "middle";
        actx.fillText("+", mp.x, mp.y + 1);
      }
    }
  }
}
window.addEventListener("resize", () => { if (adminOpen) sizeAdminCanvas(); });

function updateZoneButtons() {
  const z = zones.find(zz => zz.id === selectedZoneId);
  $("zoneDelBtn").disabled = !z;
  $("zoneCurveBtn").disabled = !z || z.type !== "poly";
  $("zoneCurveBtn").classList.toggle("on", !!(z && z.type === "poly" && z.smooth));
  $("zonePointDelBtn").disabled = !(z && z.type === "poly" && selectedVertexIdx != null && z.pts.length > 3);
}

function pointInPoly(px, py, pts) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const [xi, yi] = pts[i], [xj, yj] = pts[j];
    const hit = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
    if (hit) inside = !inside;
  }
  return inside;
}
// hit-test em pixels, já a considerar a rotação (mesma matemática do render)
function pointInEllipsePx(px, py, z, w, h) {
  const cx = z.cx * w, cy = z.cy * h, rx = Math.max(1, z.rx * w), ry = Math.max(1, z.ry * h), rot = z.rot || 0;
  const dx = px - cx, dy = py - cy;
  const cos = Math.cos(-rot), sin = Math.sin(-rot);
  const lx = dx * cos - dy * sin, ly = dx * sin + dy * cos;
  return (lx * lx) / (rx * rx) + (ly * ly) / (ry * ry) <= 1;
}
function getCanvasPt(e) {
  const rect = adminCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  return { x, y, w: rect.width, h: rect.height, nx: x / rect.width, ny: y / rect.height };
}

/* ---- interação touch: arrastar pega, inserir vértice numa aresta, ou selecionar zona ---- */
const VERTEX_HIT_R = 30; // px CSS, generoso para dedos
let dragging = null; // { zoneId, kind: 'vertex'|'center'|'rx'|'ry', idx? }
adminCanvas.addEventListener("pointerdown", e => {
  adminCanvas.setPointerCapture(e.pointerId);
  const { x, y, w, h, nx, ny } = getCanvasPt(e);

  // 1) pegas (vértices de polígono ou pegas da elipse) — prioridade máxima
  let best = null, bestD = Infinity;
  for (const z of zones) {
    for (const hpt of zoneHandlesPx(z, w, h)) {
      const d = Math.hypot(hpt.x - x, hpt.y - y);
      if (d < VERTEX_HIT_R && d < bestD) { bestD = d; best = { zone: z, handle: hpt }; }
    }
  }
  if (best) {
    selectedZoneId = best.zone.id;
    selectedVertexIdx = best.handle.kind === "vertex" ? best.handle.idx : null;
    dragging = { zoneId: best.zone.id, kind: best.handle.kind, idx: best.handle.idx };
    renderAdminCanvas(); updateZoneButtons();
    return;
  }

  // 2) pegas "+" de inserção de vértice — só na zona já selecionada, tipo poly
  const selZone = zones.find(z => z.id === selectedZoneId);
  if (selZone && selZone.type === "poly") {
    for (const mp of zoneMidpointsPx(selZone, w, h)) {
      if (Math.hypot(mp.x - x, mp.y - y) < VERTEX_HIT_R) {
        selZone.pts.splice(mp.edgeAfter + 1, 0, [clamp01(nx), clamp01(ny)]);
        selectedVertexIdx = mp.edgeAfter + 1;
        renderAdminCanvas(); updateZoneButtons();
        sendZones(true); zonesCloudSave();
        return;
      }
    }
  }

  // 3) corpo da zona: seleciona (sem vértice)
  const hitZone = zones.find(z => z.type === "ellipse" ? pointInEllipsePx(x, y, z, w, h) : pointInPoly(nx, ny, z.pts));
  selectedZoneId = hitZone ? hitZone.id : null;
  selectedVertexIdx = null;
  renderAdminCanvas(); updateZoneButtons();
});
adminCanvas.addEventListener("pointermove", e => {
  if (!dragging) return;
  const { x, y, w, h, nx, ny } = getCanvasPt(e);
  const z = zones.find(zz => zz.id === dragging.zoneId);
  if (!z) return;
  if (dragging.kind === "vertex") {
    z.pts[dragging.idx] = [clamp01(nx), clamp01(ny)];
  } else if (dragging.kind === "center") {
    z.cx = clamp01(nx); z.cy = clamp01(ny);
  } else if (dragging.kind === "rx") {
    // arrastar a pega do eixo rx muda rx E a rotação (atan2 face ao centro)
    const dx = x - z.cx * w, dy = y - z.cy * h;
    z.rot = Math.atan2(dy, dx);
    z.rx = Math.max(0.01, Math.hypot(dx, dy) / w);
  } else if (dragging.kind === "ry") {
    // arrastar a pega do eixo ry só muda ry: projeta o toque no eixo perpendicular a rot
    const dx = x - z.cx * w, dy = y - z.cy * h;
    const rot = z.rot || 0;
    const proj = dx * -Math.sin(rot) + dy * Math.cos(rot);
    z.ry = Math.max(0.01, Math.abs(proj) / h);
  }
  renderAdminCanvas();
  sendZonesThrottled();
  zonesCloudSave();
});
function endDrag() {
  if (!dragging) return;
  dragging = null;
  sendZones(true); // garante que a posição final chega, sem esperar pelo throttle
  zonesCloudSave();
}
adminCanvas.addEventListener("pointerup", endDrag);
adminCanvas.addEventListener("pointercancel", endDrag);

/* ---- botões: criar poly / criar círculo / curvas / apagar ponto / apagar zona / concluir ---- */
$("zoneAddBtn").onclick = () => {
  const id = "z" + Math.random().toString(36).slice(2, 8);
  // quadrilátero centrado, ~25% do ecrã de lado
  zones.push({ id, type: "poly", pts: [[0.375, 0.375], [0.625, 0.375], [0.625, 0.625], [0.375, 0.625]], smooth: false });
  selectedZoneId = id; selectedVertexIdx = null;
  renderAdminCanvas(); updateZoneButtons();
  sendZones(true); zonesCloudSave();
};
$("zoneCircleBtn").onclick = () => {
  const id = "z" + Math.random().toString(36).slice(2, 8);
  // elipse centrada, raio ~12.5% do ecrã (diâmetro ~25%, mesma escala da zona quadrada)
  zones.push({ id, type: "ellipse", cx: 0.5, cy: 0.5, rx: 0.125, ry: 0.125, rot: 0 });
  selectedZoneId = id; selectedVertexIdx = null;
  renderAdminCanvas(); updateZoneButtons();
  sendZones(true); zonesCloudSave();
};
$("zoneCurveBtn").onclick = () => {
  const z = zones.find(zz => zz.id === selectedZoneId);
  if (!z || z.type !== "poly") return;
  z.smooth = !z.smooth;
  renderAdminCanvas(); updateZoneButtons();
  sendZones(true); zonesCloudSave();
};
$("zonePointDelBtn").onclick = () => {
  const z = zones.find(zz => zz.id === selectedZoneId);
  if (!z || z.type !== "poly" || selectedVertexIdx == null || z.pts.length <= 3) return;
  z.pts.splice(selectedVertexIdx, 1);
  selectedVertexIdx = null;
  renderAdminCanvas(); updateZoneButtons();
  sendZones(true); zonesCloudSave();
};
$("zoneDelBtn").onclick = () => {
  if (!selectedZoneId) return;
  zones = zones.filter(z => z.id !== selectedZoneId);
  selectedZoneId = null; selectedVertexIdx = null;
  renderAdminCanvas(); updateZoneButtons();
  sendZones(true); zonesCloudSave();
};
$("zoneDoneBtn").onclick = () => closeAdmin();

function openAdmin() {
  adminOpen = true;
  selectedZoneId = null; selectedVertexIdx = null;
  adminOverlay.hidden = false;
  requestAnimationFrame(sizeAdminCanvas); // overlay precisa de estar visível para medir o canvas
  updateZoneButtons();
  sendZones(true); // entra no modo admin
}
function closeAdmin() {
  adminOpen = false;
  adminOverlay.hidden = true;
  selectedZoneId = null; selectedVertexIdx = null;
  sendZones(false); // sai do modo admin: zonas ficam pretas/invisíveis no display
}

/* ---- botão ⚙️: só entra em admin com long-press de 3s (toque curto não faz nada) ---- */
const adminGearBtn = $("adminGearBtn");
const LONG_PRESS_MS = 3000;
let pressStart = 0, pressTimer = null;
function startPress(e) {
  e.preventDefault();
  pressStart = Date.now();
  adminGearBtn.style.setProperty("--p", "0");
  pressTimer = setInterval(() => {
    const pct = Math.min(100, ((Date.now() - pressStart) / LONG_PRESS_MS) * 100);
    adminGearBtn.style.setProperty("--p", String(pct));
    if (pct >= 100) { clearInterval(pressTimer); pressTimer = null; openAdmin(); }
  }, 50);
}
function cancelPress() {
  if (pressTimer) { clearInterval(pressTimer); pressTimer = null; }
  adminGearBtn.style.setProperty("--p", "0");
}
adminGearBtn.addEventListener("pointerdown", startPress);
adminGearBtn.addEventListener("pointerup", cancelPress);
adminGearBtn.addEventListener("pointerleave", cancelPress);
adminGearBtn.addEventListener("pointercancel", cancelPress);

zonesCloudLoad(); // hidrata zonas guardadas antes de o admin abrir pela 1ª vez

/* ================= arranque ================= */
renderBrushes(); renderColors(); renderSizes(); renderMirrors(); renderPreview();
sendState(); // estado inicial emitido no arranque

/* ================= teclado ================= */
document.addEventListener("keydown", e => {
  if (e.key === "Escape") location.href = "index.html";
});
</script>
</body>
